name: Refresh PIR cache

# Refreshes cache/pir_action_cache.json + pir_history_cache.json from the
# ClickUp REST API and commits the result, so the 20:03 UTC weekly-report
# routine always clones a fresh PIR snapshot. Replaces the manual Step 2H.
#
# Requires the repo secret CLICKUP_API_TOKEN (a ClickUp personal API token:
# ClickUp → Settings → Apps → API Token).

on:
  schedule:
    - cron: "15 19 * * *"   # daily 19:15 UTC — 48 min before the report routine
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Refresh PIR caches from ClickUp
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: python3 agents/refresh_pir_cache.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/pir_action_cache.json cache/pir_history_cache.json
          if git diff --cached --quiet; then
            echo "No changes — snapshot identical to previous run."
            exit 0
          fi
          git commit -m "chore: automated PIR snapshot refresh $(date -u +%F)"
          git pull --rebase origin main
          git push
